---
ids_home_nets:

  - "10.0.50.0/24"
ids_external_net: "any"
ids_install_evebox: true
ids_evebox_host: 0.0.0.0
ids_mode: ids
ids_inspect_input: false
ids_custom_rules:
  - >
    alert tcp $EXTERNAL_NET any -> $HOME_NET [80,443,22]
    (msg:"LOCAL SYN Flood inbound - Potential DDoS"; flags:S;
    threshold: type both, track by_dst, count 400, seconds 5;
    classtype:attempted-dos; sid:1000005; rev:2;)
  - >
    alert icmp $EXTERNAL_NET any -> $HOME_NET any
    (msg:"LOCAL ICMP Flood inbound"; itype:8;
    threshold: type both, track by_dst, count 100, seconds 1;
    classtype:attempted-dos; sid:1000006; rev:1;)
  - >
    alert udp $EXTERNAL_NET any -> $HOME_NET any
    (msg:"LOCAL UDP Flood inbound";
    threshold: type both, track by_dst, count 500, seconds 1;
    classtype:attempted-dos; sid:1000007; rev:1;)
  - >
    drop tcp $EXTERNAL_NET any -> $HOME_NET any
    (msg:"LOCAL TCP Flood (potential ACK/RST) inbound"; flow:to_server;
    threshold: type both, track by_dst, count 1000, seconds 1;
    classtype:attempted-dos; sid:1000008; rev:1;)
  - >
    drop tcp $EXTERNAL_NET any -> $HOME_NET any
    (msg:"LOCAL NMAP SYN Scan"; flags:S; window:1024;
    threshold: type both, track by_src, count 10, seconds 60;
    classtype:attempted-recon; sid:1000009; rev:1;)
  - >
    drop tcp $EXTERNAL_NET any -> $HOME_NET any
    (msg:"LOCAL NMAP OS Detection Attempt"; flags:SFPU;
    classtype:attempted-recon; sid:1000010; rev:1;)
  - >
    drop http any any -> $HTTP_SERVERS any
    (msg:"LOCAL SQL Injection Attempt (Generic)";
    flow:to_server,established; content:"' OR 1=1"; nocase;
    classtype:web-application-attack; sid:1000011; rev:1;)

ids_rule_sources:
  - et/open
  - aleksibovellan/nmap
ids_rule_enable_patterns:
  - "re:nmap"
  - "re:Nmap"
  - "re:NMAP"
  - "re:sql"
  - "re:SQL"
  - "re:sqli"
  - "re:scan"
  - "re:Scan"
  - "re:SCAN"
  - "re:recon"
  - "re:Recon"
  - "re:RECON"
  - "re:exploit"
  - "re:Exploit"
  - "re:EXPLOIT"
  - "re:decoder"
  - "re:SURICATA"
  - "group:emerging-scan"
  - "group:emerging-dos"
  - "group:emerging-sql"
  - "group:emerging-web_server"
  - "group:emerging-web_specific_apps"
ids_rule_disable_patterns:
 
  - "re:dnp3"
  - "re:DNP3"
  - "re:modbus"
  - "re:Modbus"
  - "re:request_line_missing_protocol"
ids_rule_drop_patterns:
  - "re:nmap"
  - "re:Nmap"
  - "re:NMAP"
  - "re:sql"
  - "re:SQL"
  - "re:sqli"
  - "re:scan"
  - "re:Scan"
  - "re:SCAN"
  - "re:recon"
  - "re:Recon"
  - "re:RECON"
  - "re:exploit"
  - "re:Exploit"
  - "re:EXPLOIT"
  - "re:decoder"
  - "re:SURICATA"
  - "group:emerging-scan"
  - "group:emerging-dos"
  - "group:emerging-sql"
  - "group:emerging-web_server"
  - "group:emerging-web_specific_apps"


log_shipper_suricata_enabled: true
log_shipper_security_enabled: false
