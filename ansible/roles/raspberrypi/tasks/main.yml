---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - dnsmasq
      - nftables
    state: present
    update_cache: true

- name: Configure eth1 as static LAN interface (NetworkManager keyfile)
  ansible.builtin.copy:
    dest: "/etc/NetworkManager/system-connections/{{ raspberrypi_lan_interface }}-lan.nmconnection"
    content: |
      [connection]
      id={{ raspberrypi_lan_interface }}-lan
      type=ethernet
      interface-name={{ raspberrypi_lan_interface }}

      [ethernet]

      [ipv4]
      address1={{ raspberrypi_lan_ip }}/{{ raspberrypi_lan_prefix }}
      method=manual
      never-default=true

      [ipv6]
      addr-gen-mode=default
      method=auto
    mode: "0600"
  notify:
    - Reload NM connections
    - Bring up LAN connection

- name: Configure dnsmasq DHCP server on LAN interface
  ansible.builtin.copy:
    dest: /etc/dnsmasq.d/lan.conf
    content: |
      # Serve DHCP only on LAN (eth1), not on WAN
      interface={{ raspberrypi_lan_interface }}
      bind-interfaces
      dhcp-range={{ raspberrypi_dhcp_range_start }},{{ raspberrypi_dhcp_range_end }},{{ raspberrypi_lan_netmask }},{{ raspberrypi_dhcp_lease_time }}
    mode: "0644"
  notify: Restart dnsmasq

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Deploy nftables NAT ruleset
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    mode: "0644"
  notify: Reload nftables

- name: Enable nftables service
  ansible.builtin.service:
    name: nftables
    enabled: true
    state: started

- name: Enable dnsmasq service
  ansible.builtin.service:
    name: dnsmasq
    enabled: true
    state: started
