---
- name: Reload NM connections
  ansible.builtin.command: nmcli connection reload
  changed_when: true

- name: Bring up LAN connection
  ansible.builtin.command: nmcli con up "{{ raspberrypi_lan_interface }}-lan"
  changed_when: true

- name: Restart dnsmasq
  ansible.builtin.service:
    name: dnsmasq
    state: restarted

- name: Reload nftables
  ansible.builtin.service:
    name: nftables
    state: reloaded
