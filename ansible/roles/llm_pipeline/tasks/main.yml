---
- name: Ensure target directory exists for LLM pipeline
  ansible.builtin.file:
    path: /opt/llm_pipeline
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Copy LLM pipeline application code to server
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../src/llm_pipeline/"
    dest: /opt/llm_pipeline/
    mode: preserve
    owner: root
    group: root

- name: Install required system packages for Python virtual environment
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present

- name: Create virtual environment and install dependencies from requirements.txt
  ansible.builtin.pip:
    requirements: /opt/llm_pipeline/requirements.txt
    virtualenv: /opt/llm_pipeline/venv
    virtualenv_command: python3 -m venv

- name: Install inotify-tools
  ansible.builtin.package:
    name: inotify-tools
    state: present

- name: Copy watch_log.sh to server
  ansible.builtin.template:
    src: watch_log.sh.j2
    dest: /opt/llm_pipeline/watch_log.sh
    mode: "0755"
    owner: root
    group: root
  notify: Restart llm-log-watcher

- name: Copy service file to server
  ansible.builtin.template:
    src: llm-log-watcher.service.j2
    dest: /etc/systemd/system/llm-log-watcher.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart llm-log-watcher

- name: Ensure llm-log-watcher is enabled and started
  ansible.builtin.systemd:
    name: llm-log-watcher
    enabled: true
    state: started
