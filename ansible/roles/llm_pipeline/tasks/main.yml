---
- name: Ensure target directory exists for LLM pipeline
  ansible.builtin.file:
    path: /opt/llm_pipeline
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Copy LLM pipeline application code to server
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../src/llm_pipeline/"
    dest: /opt/llm_pipeline/
    mode: preserve
    owner: root
    group: root

- name: Install required system packages for Python virtual environment
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present

- name: Create virtual environment and install dependencies from requirements.txt
  ansible.builtin.pip:
    requirements: /opt/llm_pipeline/requirements.txt
    virtualenv: /opt/llm_pipeline/venv
    virtualenv_command: python3 -m venv

- name: Add cron job for LLM pipeline
  ansible.builtin.cron:
    name: "LLM pipeline"
    minute: "{{ llm_pipeline_cron_minute }}"
    job: >-
      /opt/llm_pipeline/venv/bin/python /opt/llm_pipeline/basic_ai_pipeline.py
      --log-file {{ llm_pipeline_log_file }}
      --model {{ llm_pipeline_model_name }}
      --base-url {{ llm_pipeline_api_base_url }}
    user: "{{ llm_pipeline_cron_user }}"
    state: present
