ids_interface: "{{ ansible_default_ipv4.interface | default(ansible_facts['interfaces'] | reject('equalto', 'lo') | first | default('enp0s8')) }}"
ids_interfaces: "{{ ansible_facts['interfaces'] | reject('equalto', 'lo') | list }}"
ids_mode: ids
ids_home_net: "10.0.50.0/24"
ids_home_nets:
  - "{{ ids_home_net }}"
  - "10.0.11.0/24"
ids_log_dir: /var/log/suricata
ids_alert_log: fast.log
ids_eve_log: eve.json
ids_eve_log_filemode: "644"
ids_eve_log_http: true
ids_eve_types:
  - alert
  - dns
  - tls
  - http
  - flow
  - drop

ids_rule_path: /var/lib/suricata/rules
ids_rule_files:
  - suricata.rules
  - local.rules
ids_custom_rules:
  - >-
    alert tcp $EXTERNAL_NET any -> $HOME_NET $HTTP_PORTS
    (msg:"Possible HTTP/TCP Flood detected";
    flow:stateless;
    threshold:type both, track by_src, count 100, seconds 5;
    classtype:attempted-dos; sid:1000001; rev:2;)
  # - >-
  #   drop icmp any any -> any any
  #   (msg:"Test IPS Drop Rule - ICMP Blocked";
  #   sid:9999999; rev:1;)
ids_rule_sources:
  - et/open
ids_rule_enable_patterns: []
ids_rule_disable_patterns:
  - "2231000"
  - "group:emerging-chat"
  - "group:emerging-games"
  - "group:emerging-p2p"
  - "group:emerging-policy"
  - "re:^ET INFO "
  - "re:^alert dnp3 "
  - "re:^alert modbus "
ids_rule_drop_patterns:
  - "group:emerging-scan"
  - "group:emerging-policy"
  - "group:emerging-malware"
  - "group:emerging-web_server"
  - "group:emerging-web_specific_apps"
  - "group:emerging-sql"
  - "group:emerging-exploit"
ids_threshold_config_path: /etc/suricata/threshold.config
ids_threshold_config_lines:
  - "event_filter gen_id 1, sig_id 0, type limit, track by_src, count 20, seconds 60"
  - "event_filter gen_id 1, sig_id 0, type limit, track by_dst, count 40, seconds 60"

ids_app_layer_protocols:
  http:
    libhtp:
      default-config:
        personality: IDS
        request-body-limit: "100kb"
        response-body-limit: "100kb"
        request-body-minimal-inspect-size: "32kb"
        request-body-inspect-window: "4kb"
        response-body-minimal-inspect-size: "40kb"
        response-body-inspect-window: "16kb"
        response-body-decompress-layer-limit: 2
        http-body-inline: auto
        swf-decompression:
          enabled: false
          type: both
          compress-depth: "100kb"
          decompress-depth: "100kb"
        double-decode-path: true
        double-decode-query: true
  ssh: {}

ids_update_rules: true
ids_nfqueue_chain: SURICATA_NFQUEUE
ids_install_evebox: true
ids_evebox_repo_trusted: true
ids_suricata_group: suricata
ids_evebox_config_dir: /etc/evebox
ids_evebox_config_path: /etc/evebox/evebox.yaml
ids_evebox_data_dir: /var/lib/evebox
ids_evebox_host: 0.0.0.0
ids_evebox_port: 5636
ids_evebox_auth_required: true
ids_evebox_tls_enabled: false
ids_evebox_retention_days: 7
ids_evebox_input_paths:
  - "{{ ids_log_dir }}/{{ ids_eve_log }}"

ids_active_response_enabled: false
ids_active_response_dry_run: false

ids_ap_ssh_host: "10.0.10.1"
ids_ap_ssh_user: "root"
ids_ap_ssh_port: 22
ids_ap_ssh_key: "/root/.ssh/ap_response_key"

ids_block_duration: 3600
ids_min_alert_severity: 1
ids_max_alert_severity: 2

ids_vpn_subnet: "10.0.11.0/24"

ids_whitelist_ips:
  - "10.0.50.0/24"
  - "10.0.10.50"
