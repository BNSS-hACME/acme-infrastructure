---
- name: Create systemd-resolved drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: "'dns' not in group_names"

- name: Configure systemd-resolved to use acme dns server
  ansible.builtin.copy:
    content: |
      [Resolve]
      DNS=10.0.50.10
    dest: /etc/systemd/resolved.conf.d/acme-dns.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-resolved
  when: "'dns' not in group_names"

- name: Ensure /etc/resolv.conf points to systemd-resolved stub
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  when: "'dns' not in group_names"

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication\s+'
    line: PasswordAuthentication no
    state: present
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart SSH service

- name: Disable SSH keyboard-interactive authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?KbdInteractiveAuthentication\s+'
    line: KbdInteractiveAuthentication no
    state: present
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart SSH service

- name: Disable SSH challenge-response authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ChallengeResponseAuthentication\s+'
    line: ChallengeResponseAuthentication no
    state: present
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart SSH service
  when: common_disable_ssh_password_auth | default(false)
