---
- name: Create systemd-resolved drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: "'dns' not in group_names"

- name: Configure systemd-resolved to use acme dns server
  ansible.builtin.copy:
    content: |
      [Resolve]
      DNS=10.0.50.10
    dest: /etc/systemd/resolved.conf.d/acme-dns.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-resolved
  when: "'dns' not in group_names"

- name: Ensure /etc/resolv.conf points to systemd-resolved stub
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  when: "'dns' not in group_names"

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.ssh"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Add id_ed25519 to authorized_keys
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_user }}/.ssh/authorized_keys"
    line: "{{ lookup('file', 'files/id_ed25519.pub') }}"
    create: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
