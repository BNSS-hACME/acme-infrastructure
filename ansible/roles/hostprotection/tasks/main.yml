---
- name: Install and configure fail2ban
  become: true
  block:
    - name: Install fail2ban
      ansible.builtin.apt:
        name: fail2ban
        state: present
        update_cache: true

- name: Ensure fail2ban is running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Deploy fail2ban configuration
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Install modsecurity and dependencies
  become: true
  ansible.builtin.apt:
    name:
      - libapache2-mod-security2
      - modsecurity-crs
    state: present
    update_cache: true

- name: Enable ModSecurity Apache module
  ansible.builtin.command: a2enmod security2
  args:
    creates: /etc/apache2/mods-enabled/security2.load
  notify: Restart Apache

- name: Check if ModSecurity recommended config exists
  ansible.builtin.stat:
    path: /etc/modsecurity/modsecurity.conf-recommended
  register: hostprotection_modsecurity_recommended_conf

- name: Check if active ModSecurity config exists
  ansible.builtin.stat:
    path: /etc/modsecurity/modsecurity.conf
  register: hostprotection_modsecurity_active_conf

- name: Create active ModSecurity config from recommended defaults
  ansible.builtin.copy:
    src: /etc/modsecurity/modsecurity.conf-recommended
    dest: /etc/modsecurity/modsecurity.conf
    owner: root
    group: root
    mode: "0644"
    remote_src: true
  when:
    - hostprotection_modsecurity_recommended_conf.stat.exists
    - not hostprotection_modsecurity_active_conf.stat.exists
  notify: Restart Apache

- name: Ensure ModSecurity rule engine is enabled
  ansible.builtin.lineinfile:
    path: /etc/modsecurity/modsecurity.conf
    regexp: '^\s*SecRuleEngine\s+'
    line: SecRuleEngine On
    backup: true
  when: hostprotection_modsecurity_active_conf.stat.exists or hostprotection_modsecurity_recommended_conf.stat.exists
  notify: Restart Apache

- name: Deploy Apache config for OWASP CRS includes
  ansible.builtin.template:
    src: modsecurity-crs.conf.j2
    dest: /etc/apache2/conf-available/modsecurity-crs.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart Apache

- name: Enable OWASP CRS Apache config
  ansible.builtin.command: a2enconf modsecurity-crs
  args:
    creates: /etc/apache2/conf-enabled/modsecurity-crs.conf
  notify: Restart Apache

- name: Disable SSL
  ansible.builtin.command: a2dissite default-ssl
  register: hostprotection_a2dissite
  changed_when: hostprotection_a2dissite.rc == 0 and ('already disabled' not in (hostprotection_a2dissite.stdout | default('')))
  failed_when: false
  notify: Restart Apache
